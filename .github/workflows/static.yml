<script>
// RED NEURONAL 3D
(function(){
  var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d'),W,H,nodes=[],N=80;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<N;i++) nodes.push({x:(Math.random()-.5)*1400,y:(Math.random()-.5)*900,z:(Math.random()-.5)*900,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,vz:(Math.random()-.5)*.35,r:1.5+Math.random()*2.5,p:Math.random()*Math.PI*2});
  var rY=0,rX=0,mX=0,mY=0;
  window.addEventListener('mousemove',function(e){mX=(e.clientX/window.innerWidth-.5)*.3;mY=(e.clientY/window.innerHeight-.5)*.2});
  function proj(x,y,z){var f=900/(900+z+400);return{x:x*f,y:y*f,a:f}}
  function draw(){
    ctx.fillStyle='rgba(2,4,10,0.16)';ctx.fillRect(0,0,W,H);
    rY+=(mX-rY)*.018;rX+=(mY-rX)*.018;rY+=.0007;
    var cy=Math.cos(rY),sy=Math.sin(rY),cx2=Math.cos(rX),sx=Math.sin(rX),ox=W/2,oy=H/2;
    var ps=nodes.map(function(n){
      n.x+=n.vx;n.y+=n.vy;n.z+=n.vz;
      if(Math.abs(n.x)>750)n.vx*=-1;if(Math.abs(n.y)>500)n.vy*=-1;if(Math.abs(n.z)>500)n.vz*=-1;
      n.p+=.018;
      var x1=n.x*cy+n.z*sy,z1=-n.x*sy+n.z*cy,y1=n.y*cx2-z1*sx,z2=n.y*sx+z1*cx2;
      var p=proj(x1,y1,z2);return{sx:ox+p.x,sy:oy+p.y,a:p.a,r:n.r,p:n.p,nx:n.x,ny:n.y,nz:n.z};
    });
    for(var i=0;i<ps.length;i++){
      for(var j=i+1;j<ps.length;j++){
        var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,dz=nodes[i].z-nodes[j].z;
        var d=Math.sqrt(dx*dx+dy*dy+dz*dz);
        if(d<200){var al=(1-d/200)*.3*ps[i].a;ctx.beginPath();ctx.moveTo(ps[i].sx,ps[i].sy);ctx.lineTo(ps[j].sx,ps[j].sy);ctx.strokeStyle='rgba(0,229,255,'+al+')';ctx.lineWidth=.5;ctx.stroke()}
      }
    }
    for(var i=0;i<ps.length;i++){
      var p=ps[i],g=.65+.35*Math.sin(p.p),r=p.r*p.a*g,al=Math.min(.85,p.a*.85*g);
      ctx.beginPath();ctx.arc(p.sx,p.sy,r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,'+al+')';ctx.fill();
      ctx.beginPath();ctx.arc(p.sx,p.sy,r*3.5,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,'+(al*.06)+')';ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// NAV
window.addEventListener('scroll',function(){document.getElementById('nav').classList.toggle('scrolled',scrollY>60)});

// REVEAL
var els=document.querySelectorAll('.reveal');
new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add('on');this.unobserve(e.target)}}.bind(this))},{threshold:.1}).observe&&(function(){
  var io=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add('on');io.unobserve(e.target)}})},{threshold:.1});
  els.forEach(function(el){io.observe(el)});
})();

// COUNTERS
document.querySelectorAll('.stat-num[data-n]').forEach(function(el){
  var io=new IntersectionObserver(function(en){
    if(!en[0].isIntersecting)return;
    var t=+el.dataset.n,s=null,d=1500;
    requestAnimationFrame(function step(ts){if(!s)s=ts;var p=Math.min((ts-s)/d,1),e=1-Math.pow(1-p,3);el.textContent=Math.floor(e*t);if(p<1)requestAnimationFrame(step);else el.textContent=t;});
    io.disconnect();
  },{threshold:.5});
  io.observe(el);
});
</script>
</body>
